name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            image_name: chat-frontend
            dockerfile: ./frontend/Dockerfile
          - service: backend
            image_name: chat-backend
            dockerfile: ./backend/Dockerfile
            build_args: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Docker tags
        id: meta
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          BASE_IMAGE="${DOCKER_USERNAME}/${{ matrix.image_name }}"
          TAGS=""

          if [[ "${GITHUB_REF}" == "refs/heads/main" || "${GITHUB_REF}" == "refs/heads/master" ]]; then
            TAGS="${BASE_IMAGE}:latest"
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAGS="${TAGS:+${TAGS},}${BASE_IMAGE}:${VERSION}"
            TAGS="${TAGS:+${TAGS},}${BASE_IMAGE}:latest"
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          TAGS="${TAGS:+${TAGS},}${BASE_IMAGE}:sha-${SHORT_SHA}"

          echo "tags=${TAGS}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
